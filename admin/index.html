<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · 90 Minutos Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="cms-shell.css" />
  </head>
  <body>
    <div class="admin-welcome" id="admin-welcome">
      <div class="admin-welcome__card">
        <p class="admin-welcome__eyebrow">Panel de gestion</p>
        <h1>90 Minutos Sports</h1>
        <p class="admin-welcome__text">
          Desde aqui puedes anadir, editar y publicar productos sin tocar codigo.
        </p>
        <ul class="admin-welcome__tips">
          <li>Sube una imagen y completa nombre, precio y talla.</li>
          <li>Guarda con el boton de publicar arriba a la derecha.</li>
          <li>Cada cambio queda guardado en GitHub con historial.</li>
        </ul>
      </div>
    </div>
    <!--
      URL del endpoint Identity de ESTE sitio (obligatorio si Decap arma mal el auth de GitHub).
      Si cambias de dominio, actualiza esta URL.
      Opcional: en el <script> de identity añade data-netlify-identity-site-id="UUID"
      (Site configuration → Site details → Site ID en Netlify).
    -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        var identityApiUrl = "https://90minutossports.netlify.app/.netlify/identity";
        if (!window.netlifyIdentity) return;
        window.netlifyIdentity.init({ APIUrl: identityApiUrl });
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      })();
    </script>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
    <script>
      (function () {
        function registerPreviewStyles() {
          var cms = window.CMS || window.DecapCms;
          if (cms && typeof cms.registerPreviewStyle === "function") {
            cms.registerPreviewStyle("/admin/preview.css");
            return true;
          }
          return false;
        }
        if (!registerPreviewStyles()) {
          setTimeout(registerPreviewStyles, 0);
        }
      })();
    </script>
    <script src="productos-preview.js"></script>
    <script>
      (function () {
        var welcome = document.getElementById("admin-welcome");
        var root = document.getElementById("nc-root");
        if (!welcome || !root) return;
        function syncWelcome() {
          if (root.children.length > 0) welcome.classList.add("admin-welcome--hidden");
        }
        syncWelcome();
        new MutationObserver(syncWelcome).observe(root, { childList: true });
      })();
    </script>
  </body>
</html>
